<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForexDesk — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">📈</div>
        <div>
          <span>ForexDesk</span>
          <small>ACCOUNT MANAGER PORTAL</small>
        </div>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue</p>

      <div class="error-msg" id="loginError">Invalid email or password. Please try again.</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@brokerage.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <script>
    // If already logged in, go straight to dashboard
    if (sessionStorage.getItem('fxd_user')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('loginError');

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
      }

      // Simulate auth — accept any credentials
      const name = email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      sessionStorage.setItem('fxd_user', JSON.stringify({ name, email }));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
