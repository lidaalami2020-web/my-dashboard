<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Follow-ups | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">

    <aside class="sidebar">
      <div class="sidebar__logo">MyApp</div>
      <nav class="sidebar__nav">
        <ul>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="deposits.html">Deposits</a></li>
          <li><a href="accounts.html">Accounts</a></li>
          <li><a href="followups.html" class="active">Follow-ups</a></li>
          <li><a href="preferences.html">Preferences</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="page-title">Follow-ups</h1>
        <button id="theme-toggle">Dark Mode</button>     
      </header>
      <section class="content">
        <h2>Your Follow-ups</h2>
        <p>Client follow-ups and reminders will appear here.</p>
      </section>
    </main>

  </div>
  <script>
const toggle = document.getElementById('theme-toggle');

if (localStorage.getItem('theme') === 'dark') 
document.body.classList.add('dark-mode');
}

toggle.textContent = document.body.classList.contains('dark-mode')
? 'Light Mode'
: 'Dark Mode';

toggle.addEventListener('click', () => {
document.body.classList.toggle('dark-mode');

const isDark = document.body.classList.contains('dark-mode');

toggle.textContent = isDark ? 'Light Mode' : 'Dark Mode';

localStorage.setItem('theme', isDark ? 'dark' : 'light');
});
</script>
</body>
</html>
