<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForexDesk — Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">📈</div>
        <div>
          <span>ForexDesk</span>
          <small>ACCOUNT MANAGER PORTAL</small>
        </div>
      </div>

      <h1>Create your account</h1>
      <p class="subtitle">Start managing your client portfolio today</p>

      <div class="error-msg" id="signupError"></div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Alex Johnson" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@brokerage.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';

    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('signupError');
      const btn      = this.querySelector('button[type="submit"]');

      errEl.style.display = 'none';

      if (!name || !email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res  = await fetch(`${API}/auth/register`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email, password, role: 'user' }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Registration failed. Please try again.';
          errEl.style.display = 'block';
          return;
        }

        sessionStorage.setItem('fxd_user', JSON.stringify({ id: data.id, name: data.name, email: data.email, role: data.role }));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = 'Could not reach the server. Please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
